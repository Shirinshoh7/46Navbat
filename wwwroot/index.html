<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Navbat Terminal Kiosk</title>
    <style>
        /* Основные настройки для терминала */
        :root {
            --bg-color: #f4f4f7; /* Светло-серый фон как в холле */
            --button-color: #4a4a4a; /* Темно-серые кнопки как на фото */
            --text-on-button: #ffffff;
            --text-main: #333333;
            --accent: #007bff; /* Синий для акцентов (заголовки категорий) */
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px; /* Отступы от краев экрана */
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Убираем прокрутку, если экран сенсорный */
            touch-action: manipulation; 
        }

        /* Заголовок "Выберите услугу" - КРУПНО */
        h1 {
            font-size: 64px; /* Огромный шрифт */
            font-weight: 800;
            margin-top: 40px;
            margin-bottom: 60px;
            text-align: center;
        }

        /* Контейнер категорий и услуг */
        #services-list {
            width: 100%;
            max-width: 1200px; /* Ширина контента */
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Блок категории (Заголовок) */
        .category-title {
            font-size: 32px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Сетка услуг внутри категории - 1 кнопка в ряд */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr; /* Только 1 колонка */
            gap: 20px;
        }

        /* Кнопка услуги - Точно как на фото */
        .service-card {
            background-color: var(--button-color);
            color: var(--text-on-button);
            /* Длинная горизонтальная кнопка */
            padding: 30px 40px; 
            border-radius: 50px; /* Сильное скругление */
            display: flex;
            justify-content: center; /* Текст по центру */
            align-items: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: background-color 0.2s, transform 0.1s;
            border: none;
        }

        /* Эффект при нажатии на сенсоре */
        .service-card:active {
            transform: scale(0.97);
            background-color: #333; /* Еще темнее */
        }

        .service-card h3 {
            font-size: 36px; /* Очень крупный текст услуги */
            margin: 0;
            font-weight: 700;
            text-transform: uppercase; /* Все заглавные */
        }

        /* Убрал префикс, на фото его нет на кнопке, он в базе */
        .prefix { display: none; }

        /* Модальное окно талона - Без изменений (уже хорошо) */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
        }

        #modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            color: #000;
            width: 400px;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #ticket-number { font-size: 100px; margin: 10px 0; color: #28a745; font-weight: 900; }
        .close-btn { 
            margin-top: 30px; padding: 20px 40px; background: #333; 
            color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; cursor: pointer; width: 100%; 
        }
    </style>
</head>
<body>

    <h1>ВЫБЕРИТЕ УСЛУГУ</h1>

    <div id="services-list">
        </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal" onclick="event.stopPropagation()">
            <p style="color:#888; font-size:18px;">ВАШ НОМЕР ТАЛОНА:</p>
            <h2 id="ticket-number">A-1</h2>
            <p id="service-name" style="color:#007bff; font-size:22px;">Услуга</p>
            <button class="close-btn" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5108/api';

        async function loadServices() {
            try {
                const [catRes, svcRes] = await Promise.all([
                    fetch(`${API_URL}/Categories`),
                    fetch(`${API_URL}/Services`)
                ]);

                const categories = await catRes.json();
                const services = await svcRes.json();
                const list = document.getElementById('services-list');
                list.innerHTML = '';

                // Сортировка по категориям
                categories.forEach(cat => {
                    const catServices = services.filter(s => s.categoryId === cat.id);
                    if (catServices.length === 0) return; // Пропускаем пустые категории

                    // Создаем блок категории
                    const group = document.createElement('div');
                    group.innerHTML = `<div class="category-title">${cat.name}</div>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'services-grid';

                    // Добавляем услуги
                    catServices.forEach(svc => {
                        const card = document.createElement('div');
                        card.className = 'service-card';
                        card.innerHTML = `<h3>${svc.name}</h3>`; // На фото только имя услуги
                        card.onclick = () => createTicket(svc.id, svc.name);
                        grid.appendChild(card);
                    });

                    group.appendChild(grid);
                    list.appendChild(group);
                });
            } catch (err) {
                alert('Ошибка связи с терминалом');
            }
        }

        async function createTicket(serviceId, serviceName) {
            try {
                // Твой POST метод из C#
                const response = await fetch(`${API_URL}/Tickets?serviceId=${serviceId}`, {
                    method: 'POST'
                });
                const ticket = await response.json();

                // Показываем талон
                document.getElementById('ticket-number').innerText = ticket.fullNumber;
                document.getElementById('service-name').innerText = serviceName;
                document.getElementById('modal-overlay').style.display = 'block';
                
                // Озвучка (Важно для инклюзивности)
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Талон получен"));
            } catch (err) {
                alert('Ошибка создания талона');
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        loadServices();
    </script>
</body>
</html>
