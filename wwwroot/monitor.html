<!DOCTYPE html>
<html>
<head>
    <title>Экран очереди</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: sans-serif; }
        .calling { font-size: 150px; color: #00ff00; margin-top: 100px; }
        .label { font-size: 40px; }
    </style>
</head>
<body>
    <div class="label">СЕЙЧАС ВЫЗЫВАЕТСЯ:</div>
    <div id="number" class="calling">---</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script>
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/queueHub")
            .build();

        connection.on("UpdateQueue", (fullNumber) => {
            // 1. Обновляем текст на экране
            document.getElementById("number").innerText = fullNumber;

            // 2. Озвучка голосом
            const speech = new SpeechSynthesisUtterance(`Номер ${fullNumber}, пройдите к окну один`);
            speech.lang = 'ru-RU';
            window.speechSynthesis.speak(speech);
        });

        connection.start().catch(err => console.error(err));
    </script>
</body>
</html>
